name: Update Trip Statuses

on:
  schedule:
    # Runs every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch: # lets you trigger manually from GitHub UI too

jobs:
  ping-cron-endpoint:
    runs-on: ubuntu-latest
    steps:
      - name: Call Vercel Cron Endpoint
        run: |
          curl -X GET \
            -H "Authorization: Bearer ${{ secrets.VERCEL_CRON_SECRET }}" \
            https://bus-booking-site.vercel.app/api/cron/update-trip-status
